version: 2
updates:
  - package-ecosystem: composer
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - php
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      laravel-ecosystem:
        patterns:
          - "laravel/*"
          - "inertiajs/*"
          - "spatie/*"
      dev-tooling:
        dependency-type: development
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - javascript
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      chakra-ecosystem:
        patterns:
          - "@chakra-ui/*"
          - "@emotion/*"
      inertia-ecosystem:
        patterns:
          - "@inertiajs/*"
          - "@laravel/*"
          - "laravel-*"
      lint-and-test:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "typescript-eslint"
          - "prettier*"
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "jsdom"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Madrid
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
      include: scope
