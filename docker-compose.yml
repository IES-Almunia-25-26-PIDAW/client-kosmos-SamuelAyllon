services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flowly_app
    ports:
      - "8000:8000"
    volumes:
      # Persistir la base de datos SQLite entre reinicios del contenedor
      - flowly_database:/app/database
      # Persistir archivos subidos por el usuario
      - flowly_storage:/app/storage/app
    environment:
      APP_NAME: Flowly
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
      DB_CONNECTION: sqlite
      SESSION_DRIVER: database
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      LOG_CHANNEL: stderr
    restart: unless-stopped

volumes:
  # Volumen para la base de datos (separada de la lógica de la app)
  flowly_database:
  # Volumen para archivos de usuario
  flowly_storage:
